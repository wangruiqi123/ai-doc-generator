<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 文档生成助手</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 AI 文档生成助手</h1>
            <p>通过对话收集需求，自动生成技术方案文档</p>
        </header>

        <div id="chat-box">
            <div class="message assistant">
                <div class="content">你好！我是 AI 文档生成助手。告诉我你想做什么项目，我会通过几个问题了解需求，然后帮你生成技术方案文档。</div>
            </div>
        </div>

        <div class="input-area">
            <textarea id="input" placeholder="输入你的需求..." rows="1"></textarea>
            <button id="send-btn" onclick="sendMessage()">发送</button>
            <button id="export-btn" onclick="exportMarkdown()">导出文档</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById("chat-box");
        const input = document.getElementById("input");
        const sendBtn = document.getElementById("send-btn");

        // 对话历史
        let messages = [];

        // 自动调整输入框高度
        input.addEventListener("input", function () {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 120) + "px";
        });

        // 回车发送（Shift+Enter 换行）
        input.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // 显示用户消息
            appendMessage("user", text);
            messages.push({ role: "user", content: text });
            input.value = "";
            input.style.height = "auto";

            // 禁用发送按钮
            sendBtn.disabled = true;

            // 创建助手消息容器
            const msgDiv = appendMessage("assistant", "");
            const contentDiv = msgDiv.querySelector(".content");

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value);
                    const lines = text.split("\n");

                    for (const line of lines) {
                        if (!line.startsWith("data: ")) continue;
                        const data = JSON.parse(line.slice(6));

                        if (data.error) {
                            contentDiv.textContent = "错误: " + data.error;
                            break;
                        }
                        if (data.done) break;
                        if (data.content) {
                            fullResponse += data.content;
                            contentDiv.textContent = fullResponse;
                        }
                    }
                }

                messages.push({ role: "assistant", content: fullResponse });
            } catch (e) {
                contentDiv.textContent = "请求失败: " + e.message;
            }

            sendBtn.disabled = false;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendMessage(role, content) {
            const div = document.createElement("div");
            div.className = "message " + role;
            div.innerHTML = `<div class="content">${content}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        function exportMarkdown() {
            // 找到最后一条包含 Markdown 标题的助手消息
            const assistantMsgs = messages.filter(m => m.role === "assistant");
            const doc = assistantMsgs.reverse().find(m => m.content.includes("# "));

            if (!doc) {
                alert("还没有生成文档，请先完成需求问诊。");
                return;
            }

            const blob = new Blob([doc.content], { type: "text/markdown" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "technical-proposal.md";
            a.click();
        }
    </script>
</body>
</html>
